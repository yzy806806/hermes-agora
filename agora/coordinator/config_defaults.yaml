# Agora Coordinator default configuration
# Place at ~/.agora/config.yaml to customize.
# Priority: CLI args > env vars (AGORA_*) > this file > defaults

# Service
host: "0.0.0.0"
port: 8765
debug: false

# Database
db_path: "~/.agora/data/agora.db"

# Logging
log_level: "INFO"

# CORS
cors_origins:
  - "*"

# Discussion defaults
default_rounds: 3
default_voting_method: "simple_majority"
speak_timeout_seconds: 120

# Smart discussion
smart_discussion_enabled: true
devils_advocate_enabled: true
max_rounds: 5
min_messages_for_early_vote: 6

# Realtime evaluation
realtime_eval_enabled: true
realtime_consensus_threshold: 0.8
realtime_min_messages: 3

# Consensus jump
consensus_jump_enabled: true
consensus_jump_ratio: 0.7

# Dynamic rounds
dynamic_rounds_enabled: true
dynamic_min_rounds: 2
dynamic_max_rounds: 5
dynamic_adaptive: true
dynamic_quality_threshold: 0.7
dynamic_low_quality_threshold: 0.4

# Assessment
consensus_threshold_high: 0.7
consensus_threshold_moderate: 0.5

# Auth
require_api_key: false
api_key_header: "X-Agora-Key"

# Heartbeat
heartbeat_interval_seconds: 30
heartbeat_timeout_seconds: 10
heartbeat_max_missed: 3

# Timeouts
round_timeout_seconds: 300
vote_timeout_seconds: 120
discussion_timeout_seconds: 1800
