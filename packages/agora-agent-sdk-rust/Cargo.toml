[package]
name = "agora-agent-sdk"
version = "0.1.0"
edition = "2021"
description = "Agora Agent SDK — lightweight async client for connecting Rust agents to Agora Coordinator"
license = "MIT"
keywords = ["agora", "multi-agent", "sdk", "websocket"]
categories = ["network-programming", "asynchronous"]

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"
thiserror = "2"
async-trait = "0.1"
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
env_logger = "0.11"
wiremock = "0.6"
