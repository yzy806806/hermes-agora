[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agora-hermes-bridge"
version = "0.1.0"
description = "Bridge daemon connecting Hermes profiles to Agora Coordinator"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Agora Team" }]
dependencies = [
    "agora-agent-sdk>=0.1.0",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
agora-hermes-bridge = "agora_hermes_bridge.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agora_hermes_bridge"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
