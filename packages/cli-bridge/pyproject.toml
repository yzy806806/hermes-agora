[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agora-cli-bridge"
version = "0.1.0"
description = "CLI Bridge for connecting CLI-based agents to Agora Coordinator"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Agora Team" }]
keywords = ["agora", "cli", "bridge", "agent", "pty"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "agora-agent-sdk>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.0.0",
]

[project.urls]
Homepage = "https://github.com/yzy806806/agora"
Repository = "https://github.com/yzy806806/agora"

[tool.hatch.build.targets.wheel]
packages = ["src/agora_cli_bridge"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
