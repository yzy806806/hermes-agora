name: agora
version: "0.5.0"
description: "Multi-Agent Deliberation Plugin for Hermes — enables structured discussion, negotiation, and voting among multiple Hermes Agents. Each participant is a full Hermes instance with memory, skills, and self-evolution capabilities."
author: yzy806806
kind: backend
provides_tools:
  - agora_create_motion
  - agora_speak
  - agora_vote
  - agora_list_motions
  - agora_get_history
  - agora_get_result
hooks:
  - on_session_start
  - on_session_end
  - post_tool_call
provides_commands:
  - name: agora
    description: "多 Agent 讨论决策"
    args_hint: "<new|list|status|vote|result> [args]"