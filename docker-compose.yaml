# Agora Development Environment
#
# Usage:
#   Start:    docker compose up
#   Stop:     docker compose down
#   Logs:     docker compose logs -f
#   Clean:    docker compose down -v
#
# Starts coordinator + a sample agent container

services:
  coordinator:
    build:
      context: .
      target: coordinator
    ports:
      - "8765:8765"
    environment:
      - AGORA_HOST=0.0.0.0
      - AGORA_PORT=8765
      - AGORA_DB_PATH=/data/agora.db
      - AGORA_LOG_LEVEL=debug
    volumes:
      - agora-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/v1/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  sample-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      - AGORA_COORDINATOR_URL=http://coordinator:8765
      - AGORA_AGENT_ID=sample-agent
      - AGORA_LOG_LEVEL=info
    depends_on:
      coordinator:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agora-data:
