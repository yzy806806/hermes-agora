# Agora Production Deployment (Multi-tenant)
#
# Usage:
#   Start:    docker compose -f docker-compose.prod.yaml up -d
#   Stop:     docker compose -f docker-compose.prod.yaml down
#   Logs:     docker compose -f docker-compose.prod.yaml logs -f
#   Cleanup:  docker compose -f docker-compose.prod.yaml down -v
#
# Required env vars (set before starting):
#   AGORA_JWT_SECRET  — secret for JWT token signing

services:
  coordinator:
    image: ghcr.io/yzy806806/agora-coordinator:v0.13.0
    ports:
      - "${AGORA_PORT:-8000}:8000"
    volumes:
      - agora_data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - AGORA_HOST=0.0.0.0
      - AGORA_PORT=8000
      - AGORA_DB_PATH=/data/agora.db
      - AGORA_REQUIRE_APPROVAL=true
      - AGORA_RBAC_ENFORCE=true
      - AGORA_LOG_LEVEL=${AGORA_LOG_LEVEL:-info}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  hermes-bridge:
    image: ghcr.io/yzy806806/agora-hermes-bridge:v0.13.0
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      - AGORA_URL=http://coordinator:8000
      - HERMES_PROFILES=${HERMES_PROFILES:-maintainer,planner,dev-merger,reviewer,releaser}
      - HERMES_HOME=/hermes
      - AGORA_LOG_LEVEL=${AGORA_LOG_LEVEL:-info}
    volumes:
      - hermes_data:/hermes
    restart: unless-stopped

volumes:
  agora_data:
  hermes_data:
